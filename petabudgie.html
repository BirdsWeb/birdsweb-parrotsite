<!DOCTYPE html>
<html lang="it">
<head>
<title>Pet-a-Budgie</title>

<style>
body {
  font-family: Comic Sans MS, cursive;
  text-align: center;
  background-color: #f0f8ff;
}

#budgie {
  width: 300px;
  cursor: pointer;
}

#message {
  font-size: 20px;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Pet-a-Budgie!</h1>
<p>Clicca il cocorito per accarezzarlo 🐦</p>

<img id="budgie" src="budgie.png" alt="cocorito">

<p id="message"></p>

<script>
const messages = [
  "Il cocorito è felice! Chirp!",
  "Il cocorito ti guarda con affetto.",
  "Chirp chirp! Gli piace!",
  "Il cocorito salta di gioia!",
  "Il cocorito canta!"
];

const budgie = document.getElementById("budgie");
const message = document.getElementById("message");

budgie.onclick = function () {
  const random = Math.floor(Math.random() * messages.length);
  message.innerText = messages[random];
};
</script>

</body>
</html>
